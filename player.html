<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IPTV Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f0f2f5;--panel:#fff;--border:#e0e0e0;--text:#1a1a2e;--text2:#666;--text3:#888;--accent:#1a73e8;--accent2:#1557b0;--hover:#f0f0f0;--active:#e8f0fe;--green:#1e8e3e;--red:#d93025}
[data-theme="dark"]{--bg:#0f172a;--panel:#1e293b;--border:#334155;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--accent:#3b82f6;--accent2:#2563eb;--hover:#334155;--active:#1e3a5f;--green:#22c55e;--red:#ef4444}
[data-theme="openwrt"]{--bg:#1a1b26;--panel:#24283b;--border:#3b4261;--text:#c0caf5;--text2:#9aa5ce;--text3:#565f89;--accent:#7aa2f7;--accent2:#6893db;--hover:#292e42;--active:#1f2335;--green:#9ece6a;--red:#f7768e}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;overflow:hidden}
#app{display:flex;height:100vh}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--border)}
#topbar .now{font-size:13px;font-weight:600;color:var(--text2);margin-right:8px;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#topbar input{flex:1;padding:7px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;min-width:120px}
#topbar input:focus{outline:none;border-color:var(--accent)}
#topbar button{padding:7px 14px;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px;white-space:nowrap;transition:background .15s}
.btn-play{background:var(--accent);color:#fff}.btn-play:hover{background:var(--accent2)}
.btn-icon{background:var(--hover);color:var(--text2);padding:7px 10px;font-size:16px}.btn-icon:hover{background:var(--border);color:var(--text)}
#video-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;min-height:0;overflow:hidden}
video{max-width:100%;max-height:100%;background:var(--bg);display:block}
video.ar-16-9{aspect-ratio:16/9;width:100%;height:auto;max-height:100%}
video.ar-4-3{aspect-ratio:4/3;width:100%;height:auto;max-height:100%}
video.ar-fill{width:100%;height:100%;object-fit:cover}
video.ar-auto{width:auto;height:auto;max-width:100%;max-height:100%}
#epg-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(15,23,42,.92);padding:12px 16px;max-height:120px;overflow-y:auto;backdrop-filter:blur(8px);display:none}
#epg-overlay.show{display:block}
#epg-overlay .epg-now{font-size:13px;color:var(--green);font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px}
#epg-overlay .epg-next{font-size:12px;color:var(--text3)}
#epg-overlay .epg-archive-btn{background:var(--accent);color:#fff;border:none;border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;font-weight:600;white-space:nowrap}
#epg-overlay .epg-archive-btn:hover{background:var(--accent2)}
#epg-overlay .epg-archive-btn:disabled{opacity:.5;cursor:default}
#catchup-bar{position:absolute;bottom:120px;left:0;right:0;background:rgba(15,23,42,.95);padding:10px 16px;display:none;backdrop-filter:blur(8px)}
#catchup-bar.show{display:block}
#catchup-bar .catchup-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
#catchup-bar .catchup-title{font-size:13px;color:var(--text);font-weight:600}
#catchup-bar .catchup-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer}
#catchup-bar .catchup-timeline{display:flex;gap:2px;overflow-x:auto;padding:4px 0}
#catchup-bar .catchup-item{flex:0 0 auto;width:120px;padding:6px 8px;background:rgba(255,255,255,.08);border-radius:4px;cursor:pointer;font-size:11px;color:var(--text2);transition:all .15s}
#catchup-bar .catchup-item:hover{background:rgba(255,255,255,.15);color:var(--text)}
#catchup-bar .catchup-item.active{background:var(--accent);color:#fff}
#catchup-bar .catchup-item .catchup-time{font-size:10px;color:var(--text3);margin-bottom:2px}
#catchup-bar .catchup-item.active .catchup-time{color:rgba(255,255,255,.7)}
#error{display:none;position:absolute;text-align:center;padding:40px}
#error h2{margin-bottom:8px;color:var(--red)}
#error p{color:var(--text3);font-size:14px}
#sidebar{width:340px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sb-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
#sb-head h3{font-size:14px;font-weight:600}
#sb-head .cnt{font-size:12px;color:var(--text3)}
#sb-tabs{display:flex;gap:4px;padding:6px 12px;border-bottom:1px solid var(--border)}
#sb-tabs button{flex:1;padding:5px;background:var(--hover);border:none;border-radius:5px;color:var(--text3);cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
#sb-tabs button.on{background:var(--accent);color:#fff}
#sb-search{padding:6px 12px;border-bottom:1px solid var(--border)}
#sb-search input{width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px}
#sb-search input:focus{outline:none;border-color:var(--accent)}
#sb-group{padding:4px 12px 6px;border-bottom:1px solid var(--border)}
#sb-group select{width:100%;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px}
#sb-pl{padding:8px 12px;border-bottom:1px solid var(--border);display:none}
#sb-pl input{width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;margin-bottom:6px}
#sb-pl button{width:100%;padding:6px;background:var(--green);border:none;border-radius:5px;color:#fff;font-weight:600;cursor:pointer;font-size:12px}
.fav-star{color:#64748b;font-size:14px;cursor:pointer;flex-shrink:0;transition:color .15s}
.fav-star.on{color:#f59e0b}
.fav-star:hover{color:#fbbf24}
/* EPG Grid */
#epg-grid{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--panel);z-index:200;display:none;flex-direction:column}
#epg-grid.show{display:flex}
#epg-grid-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--panel)}
#epg-grid-head h3{font-size:16px;font-weight:600}
#epg-grid-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text);padding:4px 8px}
#epg-grid-body{flex:1;overflow-y:auto;padding:8px}
/* Remote control */
#remote-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#remote-overlay.show{display:flex}
#remote-overlay .remote-title{font-size:14px;color:var(--text3)}
.remote-btn{width:120px;height:120px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:32px;cursor:pointer;transition:all .15s}
.remote-btn:hover{background:var(--accent2);transform:scale(1.05)}
.remote-btn:active{transform:scale(.95)}
.remote-row{display:flex;gap:24px;align-items:center}
.remote-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text3);font-size:24px;cursor:pointer}
.epg-ch-row{display:flex;gap:4px;margin-bottom:4px;align-items:stretch}
.epg-ch-label{width:100px;flex-shrink:0;padding:6px 8px;font-size:11px;font-weight:600;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-right:2px solid var(--border)}
.epg-programs{flex:1;display:flex;gap:2px;overflow-x:auto}
.epg-prog{flex:0 0 auto;padding:6px 10px;background:var(--hover);border-radius:4px;font-size:11px;cursor:pointer;min-width:80px;transition:all .15s;border-left:3px solid transparent}
.epg-prog:hover{background:var(--active)}
.epg-prog.now{background:var(--accent);color:#fff;border-left-color:var(--green)}
.epg-prog.past{opacity:.5}
.epg-prog .epg-prog-time{font-weight:600;font-size:10px;margin-bottom:2px}
.epg-prog .epg-prog-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#ch-list{flex:1;overflow-y:auto}
.ch{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;border-bottom:1px solid rgba(51,65,85,.4);transition:background .12s}
.ch:hover{background:var(--hover)}
.ch.on{background:var(--active);border-left:3px solid var(--accent)}
.ch-logo{width:32px;height:32px;border-radius:5px;overflow:hidden;flex-shrink:0;background:var(--bg);display:flex;align-items:center;justify-content:center}
.ch-logo img{width:100%;height:100%;object-fit:contain}
.ch-logo .ph{font-size:16px}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-meta{font-size:11px;color:var(--text3);margin-top:1px}
.ch-now{font-size:11px;color:var(--green);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#loading{padding:30px;text-align:center;color:var(--text3)}
#empty{padding:30px;text-align:center;color:var(--text3);font-size:13px}
#toggle-sb{display:none;padding:6px 10px;background:var(--hover);border:none;border-radius:5px;color:var(--text);cursor:pointer;font-size:16px}
@media(max-width:800px){
    #sidebar{position:fixed;right:-340px;top:0;bottom:0;z-index:100;transition:right .25s}
    #sidebar.open{right:0}
    #toggle-sb{display:block}
}
</style>
</head>
<body>
<div id="app">
<div id="main">
<div id="topbar">
<button id="toggle-sb" onclick="toggleSb()">☰</button>
<span class="now" id="now-ch"></span>
<input type="text" id="url-in" placeholder="Поток или URL плейлиста...">
<button class="btn-play" onclick="handleUrl()">▶</button>
<button class="btn-icon" onclick="toggleRemote()" title="Режим пульта" id="remote-btn">📱</button>
<button class="btn-icon" onclick="toggleAr()" title="Соотношение сторон" id="ar-btn">⬜</button>
<button class="btn-icon" onclick="togglePip()" title="Картинка в картинке">⧉</button>
<button class="btn-icon" onclick="openEpgGrid()" title="Телепрограмма">📺</button>
<button class="btn-icon" onclick="toggleFs()" title="Полный экран">⛶</button>
<button class="btn-icon" onclick="toggleTheme()" id="ttb" title="Тема">☀️</button>
</div>
<div id="video-wrap">
<video id="vid" controls autoplay playsinline></video>
<div id="epg-overlay">
<div class="epg-now" id="epg-now"></div>
<div class="epg-next" id="epg-next"></div>
</div>
<div id="catchup-bar">
<div class="catchup-header">
<span class="catchup-title" id="catchup-title">Архив передач</span>
<button class="catchup-close" onclick="closeCatchup()">✕</button>
</div>
<div class="catchup-timeline" id="catchup-timeline"></div>
</div>
<div id="epg-grid">
<div id="epg-grid-head">
<h3>📺 Телепрограмма</h3>
<button id="epg-grid-close" onclick="closeEpgGrid()">✕</button>
</div>
<div id="epg-grid-body"></div>
</div>
<div id="remote-overlay">
<button class="remote-close" onclick="toggleRemote()">✕</button>
<div class="remote-title">Пульт — текущий канал: <span id="remote-ch-name">—</span></div>
<div class="remote-row">
<button class="remote-btn" onclick="remoteAction('vol-up')" title="Громкость +">🔊</button>
</div>
<div class="remote-row">
<button class="remote-btn" onclick="remoteAction('up')" title="Канал ▲">▲</button>
</div>
<div class="remote-row">
<button class="remote-btn" onclick="remoteAction('play')" title="Пауза/Play">⏯</button>
</div>
<div class="remote-row">
<button class="remote-btn" onclick="remoteAction('down')" title="Канал ▼">▼</button>
</div>
<div class="remote-row">
<button class="remote-btn" onclick="remoteAction('vol-down')" title="Громкость −">🔉</button>
</div>
</div>
<div id="error">
<h2 id="err-title">Ошибка</h2>
<p id="err-text"></p>
</div>
</div>
</div>
<div id="sidebar">
<div id="sb-head">
<h3>📺 Каналы</h3>
<span class="cnt" id="ch-cnt"></span>
</div>
<div id="sb-tabs">
<button class="on" onclick="tab('ch',this)">Каналы</button>
<button onclick="tab('fav',this)">★ Избранное</button>
<button onclick="tab('pl',this)">Плейлист</button>
</div>
<div id="sb-search">
<input type="text" id="sb-q" placeholder="Поиск..." oninput="filter()">
</div>
<div id="sb-group">
<select id="sb-g" onchange="filter()"><option value="">Все группы</option></select>
</div>
<div id="sb-pl">
<input type="text" id="pl-url" placeholder="URL M3U/M3U8 плейлиста...">
<button onclick="loadPl()">Загрузить плейлист</button>
</div>
<div id="ch-list"><div id="loading">Загрузка...</div></div>
</div>
</div>
<script>
var vid=document.getElementById('vid');
var urlIn=document.getElementById('url-in');
var nowCh=document.getElementById('now-ch');
var errDiv=document.getElementById('error');
var errText=document.getElementById('err-text');
var epgOv=document.getElementById('epg-overlay');
var epgNow=document.getElementById('epg-now');
var epgNext=document.getElementById('epg-next');
var chList=document.getElementById('ch-list');
var catchupBar=document.getElementById('catchup-bar');
var catchupTimeline=document.getElementById('catchup-timeline');
var hls=null,channels=[],filtered=[],curIdx=-1,epgData={},epgFullData={},curMode='ch',favorites=[],catchupData=null,curCatchupIdx=-1;
var retryCount=0,MAX_RETRIES=3,RETRY_DELAY=2000;
var lastUrl='',lastIdx=-1;

function play(url,idx){
    if(!url)return;
    urlIn.value=url;
    errDiv.style.display='none';
    epgOv.classList.remove('show');
    retryCount=0;
    lastUrl=url;
    lastIdx=(idx!==undefined&&idx!==null)?idx:curIdx;
    // Save last channel
    try{
        localStorage.setItem('iptv-last-channel',JSON.stringify({url:url,idx:lastIdx}));
        if(vid.volume!==undefined)localStorage.setItem('iptv-volume',String(vid.volume));
    }catch(e){}
    _doPlay(url,idx);
}

function _doPlay(url,idx){
    if(hls){hls.destroy();hls=null}
    if(Hls.isSupported()){
        hls=new Hls({
            enableWorker:true,
            lowLatencyMode:true,
            maxBufferLength:30,
            maxMaxBufferLength:60,
            startLevel:-1,
            capLevelToPlayerSize:true
        });
        hls.loadSource(url);
        hls.attachMedia(vid);
        hls.on(Hls.Events.MANIFEST_PARSED,function(){vid.play().catch(function(){})});
        hls.on(Hls.Events.ERROR,function(e,d){
            if(d.fatal){
                if(d.type===Hls.ErrorTypes.NETWORK_ERROR){
                    if(retryCount<MAX_RETRIES){
                        retryCount++;
                        errText.textContent='Ошибка сети. Переподключение ('+retryCount+'/'+MAX_RETRIES+')...';
                        errDiv.style.display='block';
                        setTimeout(function(){_doPlay(lastUrl,lastIdx)},RETRY_DELAY);
                    }else{
                        errText.textContent='Ошибка сети. Поток недоступен после '+MAX_RETRIES+' попыток.';
                        errDiv.style.display='block';
                    }
                }else if(d.type===Hls.ErrorTypes.MEDIA_ERROR){
                    if(retryCount<MAX_RETRIES){
                        retryCount++;
                        errText.textContent='Ошибка медиа. Восстановление...';
                        errDiv.style.display='block';
                        hls.recoverMediaError();
                        setTimeout(function(){
                            if(!vid.paused&&vid.error){_doPlay(lastUrl,lastIdx)}
                        },RETRY_DELAY);
                    }else{
                        errText.textContent='Ошибка медиа. Невосстановимо.';
                        errDiv.style.display='block';
                    }
                }else{
                    errText.textContent='Неподдерживаемый формат.';
                    errDiv.style.display='block';
                }
            }
        });
        hls.on(Hls.Events.FRAG_LOADED,function(){
            if(errDiv.style.display==='block'){
                errDiv.style.display='none';
            }
        });
    }else if(vid.canPlayType('application/vnd.apple.mpegurl')){
        vid.src=url;
        vid.addEventListener('loadedmetadata',function(){vid.play().catch(function(){})});
        vid.onerror=function(){
            if(retryCount<MAX_RETRIES){
                retryCount++;
                errText.textContent='Ошибка загрузки. Переподключение ('+retryCount+'/'+MAX_RETRIES+')...';
                errDiv.style.display='block';
                vid.src=url;
                vid.load();
                vid.play().catch(function(){});
            }else{
                errText.textContent='Ошибка загрузки после '+MAX_RETRIES+' попыток.';
                errDiv.style.display='block';
            }
        };
    }else{
        errText.textContent='Браузер не поддерживает HLS.';
        errDiv.style.display='block';
    }
    if(idx!==undefined&&idx!==null){
        curIdx=idx;
        var ch=channels[idx];
        if(ch){
            nowCh.textContent=ch.n;
            showEpg(ch.i);
        }
        document.querySelectorAll('.ch').forEach(function(el,i){
            el.classList.toggle('on',i===fIdx(idx));
        });
    }
}

function handleUrl(){
    var u=urlIn.value.trim();
    if(!u)return;
    if(u.indexOf('.m3u')>=0||u.indexOf('playlist')>=0){
        loadPlUrl(u);
    }else{
        play(u);
    }
}

function fIdx(ri){
    for(var i=0;i<filtered.length;i++){if(filtered[i]._r===ri)return i}
    return -1;
}

function render(){
    if(!filtered.length){chList.innerHTML='<div id="empty">Нет каналов</div>';return}
    var h='';
    for(var i=0;i<filtered.length;i++){
        var ch=filtered[i];
        var lh=ch.l?'<img src="'+esc(ch.l)+'" onerror="this.parentElement.innerHTML=\'📺\'">':'<span class="ph">📺</span>';
        var now=ch.i&&epgData[ch.i]?'<div class="ch-now">📡 '+esc(epgData[ch.i])+'</div>':'';
        var isFav=favorites.indexOf(ch._r)>=0;
        h+='<div class="ch'+(ch._r===curIdx?' on':'')+'" onclick="play(\''+esc(ch.u).replace(/'/g,"\\'")+'\','+ch._r+')">';
        h+='<span class="fav-star'+(isFav?' on':'')+'" onclick="event.stopPropagation();toggleFav('+ch._r+')">'+(isFav?'★':'☆')+'</span>';
        h+='<div class="ch-logo">'+lh+'</div>';
        h+='<div class="ch-info"><div class="ch-name">'+esc(ch.n)+'</div>';
        h+='<div class="ch-meta">'+esc(ch.g)+'</div>'+now+'</div></div>';
    }
    chList.innerHTML=h;
}

function filter(){
    var q=document.getElementById('sb-q').value.toLowerCase();
    var g=document.getElementById('sb-g').value;
    filtered=[];
    for(var i=0;i<channels.length;i++){
        var ch=channels[i];
        var matchGroup=!g||ch.g===g;
        var matchQuery=!q||ch.n.toLowerCase().indexOf(q)>=0;
        var matchFav=curMode!=='fav'||favorites.indexOf(i)>=0;
        if(matchGroup&&matchQuery&&matchFav){
            ch._r=i;filtered.push(ch);
        }
    }
    document.getElementById('ch-cnt').textContent=filtered.length+'/'+channels.length;
    render();
}

function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function toggleSb(){document.getElementById('sidebar').classList.toggle('open')}

function tab(m,btn){
    curMode=m;
    document.querySelectorAll('#sb-tabs button').forEach(function(b){b.classList.remove('on')});
    btn.classList.add('on');
    document.getElementById('sb-search').style.display=(m==='ch'||m==='fav')?'':'none';
    document.getElementById('sb-group').style.display=(m==='ch'||m==='fav')?'':'none';
    document.getElementById('sb-pl').style.display=m==='pl'?'':'none';
    if(m==='ch'||m==='fav')filter();
}

function parseM3U(text){
    var lines=text.split('\n');
    var r=[],name='',group='',logo='',tvgid='';
    for(var i=0;i<lines.length;i++){
        var l=lines[i].replace(/^\s+|\s+$/g,'');
        if(l.indexOf('#EXTINF:')===0){
            name='';group='';logo='';tvgid='';
            var ci=l.indexOf(',');
            if(ci>=0)name=l.substring(ci+1).replace(/^\s+/,'');
            var m;
            m=l.match(/group-title="([^"]*)"/);if(m)group=m[1];
            m=l.match(/tvg-logo="([^"]*)"/);if(m)logo=m[1];
            m=l.match(/tvg-id="([^"]*)"/);if(m)tvgid=m[1];
            if(!name)name='Неизвестный';
            if(!group)group='Общее';
        }else if(/^(https?|rtsp|rtmp|udp|rtp):/i.test(l)){
            r.push({n:name,g:group,l:logo,i:tvgid,u:l});
            name='';group='';logo='';tvgid='';
        }
    }
    return r;
}

function loadPlUrl(url){
    chList.innerHTML='<div id="loading">Загрузка плейлиста...</div>';
    var x=new XMLHttpRequest();
    x.open('GET',url,true);

function loadEpg(){
    var x=new XMLHttpRequest();
    x.open('GET',window.location.origin+'/epg.xml',true);
    x.onload=function(){
        try{
            var xml=x.responseXML;
            if(!xml)return;
            var now=new Date();
            var ns=now.getFullYear()+p2(now.getMonth()+1)+p2(now.getDate())+p2(now.getHours())+p2(now.getMinutes())+p2(now.getSeconds());
            var progs=xml.getElementsByTagName('programme');
            for(var i=0;i<progs.length;i++){
                var p=progs[i];
                var st=p.getAttribute('start'),sp=p.getAttribute('stop'),ch=p.getAttribute('channel');
                var te=p.getElementsByTagName('title')[0];
                var ti=te?te.textContent:'';
                var cuId=p.getAttribute('catchup-id')||'';
                // Parse timestamps
                var startTs=0,endTs=0;
                if(st){
                    var ys=st.substring(0,4),ms=st.substring(4,6),ds=st.substring(6,8);
                    var hs=st.substring(8,10),mis=st.substring(10,12),ss=st.substring(12,14);
                    startTs=new Date(ys,ms-1,ds,hs,mis,ss).getTime()/1000;
                }
                if(sp){
                    var ye=sp.substring(0,4),me=sp.substring(4,6),de=sp.substring(6,8);
                    var he=sp.substring(8,10),mie=sp.substring(10,12),se=sp.substring(12,14);
                    endTs=new Date(ye,me-1,de,he,mie,se).getTime()/1000;
                }
                // "Сейчас играет"
                if(st&&sp&&st<=ns&&sp>=ns&&ch&&ti)epgData[ch]=ti;
                // Полные данные для catchup
                if(ch&&ti){
                    if(!epgFullData[ch])epgFullData[ch]=[];
                    epgFullData[ch].push({title:ti,startTs:startTs,endTs:endTs,catchupId:cuId});
                }
            }
            render();
        }catch(e){}
    };
    x.send();
}

function p2(n){return n<10?'0'+n:''+n}

function showEpg(id){
    if(!id||!epgData[id]){epgOv.classList.remove('show');return}
    var ch=channels[curIdx];
    var hasCatchup=ch&&ch.catchup&&ch.catchup!=='none'&&ch.catchup_source;
    epgNow.innerHTML='📡 '+epgData[id];
    if(hasCatchup){
        epgNow.innerHTML+=' <button class="epg-archive-btn" onclick="openCatchup()">📺 Архив</button>';
    }
    epgOv.classList.add('show');
    setTimeout(function(){epgOv.classList.remove('show')},5000);
}

// --- Catchup / Timeshift ---
function openCatchup(){
    var ch=channels[curIdx];
    if(!ch)return;
    var chId=ch.i;
    if(!chId||!epgFullData[chId]){
        alert('Архив недоступен для этого канала');
        return;
    }
    catchupData=epgFullData[chId].filter(function(p){return p.startTs&&p.endTs&&p.startTs<Date.now()/1000});
    if(!catchupData.length){
        alert('Нет прошедших передач в архиве');
        return;
    }
    // Sort by time, newest first
    catchupData.sort(function(a,b){return b.startTs-a.startTs});
    // Show last 12 programs
    catchupData=catchupData.slice(0,12);
    renderCatchupTimeline(ch);
    catchupBar.classList.add('show');
}

function closeCatchup(){
    catchupBar.classList.remove('show');
    catchupData=null;
}

function renderCatchupTimeline(ch){
    var h='';
    for(var i=0;i<catchupData.length;i++){
        var p=catchupData[i];
        var d=new Date(p.startTs*1000);
        var timeStr=('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
        h+='<div class="catchup-item" onclick="playCatchup('+i+')" data-idx="'+i+'">';
        h+='<div class="catchup-time">'+timeStr+'</div>';
        h+='<div>'+esc(p.title)+'</div></div>';
    }
    catchupTimeline.innerHTML=h;
}

function playCatchup(idx){
    var p=catchupData[idx];
    if(!p)return;
    var ch=channels[curIdx];
    var catchupType=ch.catchup||'shift';
    var catchupSource=ch.catchup_source||'';

    // Show loading
    document.querySelectorAll('.catchup-item').forEach(function(el,i){
        el.classList.toggle('active',i===idx);
    });

    // Build catchup URL via API
    var x=new XMLHttpRequest();
    x.open('POST',window.location.origin+'/cgi-bin/admin.cgi',true);
    x.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
    x.onload=function(){
        try{
            var r=JSON.parse(x.responseText);
            if(r.status==='ok'&&r.url){
                play(r.url,curIdx);
            }else{
                alert('Не удалось открыть архив: '+(r.message||''));
            }
        }catch(e){alert('Ошибка загрузки архива')}
    };
    x.onerror=function(){alert('Ошибка сети')};
    var params='action=get_catchup_url&channel_idx='+curIdx+'&start_ts='+Math.floor(p.startTs)+'&end_ts='+Math.floor(p.endTs);
    if(p.catchupId)params+='&catchup_id='+encodeURIComponent(p.catchupId);
    x.send(params);
}

function openEpgGrid(){
    if(!Object.keys(epgFullData).length){
        alert('Телепрограмма не загружена');
        return;
    }
    var body=document.getElementById('epg-grid-body');
    var now=Math.floor(Date.now()/1000);
    var h='';
    for(var chId in epgFullData){
        var progs=epgFullData[chId].filter(function(p){return p.startTs&&p.endTs});
        if(!progs.length)continue;
        progs.sort(function(a,b){return a.startTs-b.startTs});
        // Find channel name
        var chName=chId;
        for(var i=0;i<channels.length;i++){
            if(channels[i].i===chId){chName=channels[i].n;break}
        }
        h+='<div class="epg-ch-row"><div class="epg-ch-label">'+esc(chName)+'</div><div class="epg-programs">';
        for(var j=0;j<progs.length;j++){
            var p=progs[j];
            var d=new Date(p.startTs*1000);
            var timeStr=('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
            var cls='';
            if(p.startTs<=now&&p.endTs>now)cls='now';
            else if(p.endTs<=now)cls='past';
            h+='<div class="epg-prog '+cls+'"';
            if(cls==='now'&&channels[curIdx]&&channels[curIdx].i===chId){
                h+=' onclick="playCatchupFromEpg(\''+esc(chId)+'\','+Math.floor(p.startTs)+','+Math.floor(p.endTs)+')"';
            }
            h+='><div class="epg-prog-time">'+timeStr+'</div><div class="epg-prog-title">'+esc(p.title)+'</div></div>';
        }
        h+='</div></div>';
    }
    body.innerHTML=h||'<div style="padding:20px;text-align:center;color:var(--text3)">Нет данных</div>';
    document.getElementById('epg-grid').classList.add('show');
}

function closeEpgGrid(){
    document.getElementById('epg-grid').classList.remove('show');
}

function playCatchupFromEpg(chId,startTs,endTs){
    var idx=-1;
    for(var i=0;i<channels.length;i++){
        if(channels[i].i===chId){idx=i;break}
    }
    if(idx<0)return;
    var ch=channels[idx];
    var x=new XMLHttpRequest();
    x.open('POST',window.location.origin+'/cgi-bin/admin.cgi',true);
    x.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
    x.onload=function(){
        try{
            var r=JSON.parse(x.responseText);
            if(r.status==='ok'&&r.url){
                play(r.url,idx);
                closeEpgGrid();
            }else{
                alert('Не удалось открыть: '+(r.message||''));
            }
        }catch(e){alert('Ошибка')}
    };
    x.onerror=function(){alert('Ошибка сети')};
    var params='action=get_catchup_url&channel_idx='+idx+'&start_ts='+startTs+'&end_ts='+endTs;
    x.send(params);
}

// Remote control
var isRemote=false;
function toggleRemote(){
    isRemote=!isRemote;
    document.getElementById('remote-overlay').classList.toggle('show',isRemote);
    document.getElementById('remote-btn').textContent=isRemote?'📺':'📱';
    if(isRemote){
        var ch=channels[curIdx];
        document.getElementById('remote-ch-name').textContent=ch?ch.n:'—';
    }
}

function remoteAction(action){
    switch(action){
        case 'up':
            if(curIdx>0)play(channels[curIdx-1].u,curIdx-1);
            break;
        case 'down':
            if(curIdx<channels.length-1)play(channels[curIdx+1].u,curIdx+1);
            break;
        case 'play':
            vid.paused?vid.play():vid.pause();
            break;
        case 'vol-up':
            vid.volume=Math.min(1,vid.volume+0.1);
            break;
        case 'vol-down':
            vid.volume=Math.max(0,vid.volume-0.1);
            break;
    }
    // Update remote display
    var ch=channels[curIdx];
    document.getElementById('remote-ch-name').textContent=ch?ch.n:'—';
    // Also send event for other tabs (cross-tab remote)
    try{localStorage.setItem('iptv-remote-action',JSON.stringify({action:action,idx:curIdx,ts:Date.now()}))}catch(e){}
}

// Listen for remote actions from other tabs
window.addEventListener('storage',function(e){
    if(e.key==='iptv-remote-action'){
        try{
            var data=JSON.parse(e.newValue);
            if(data&&data.action){
                remoteAction(data.action);
            }
        }catch(ex){}
    }
});
